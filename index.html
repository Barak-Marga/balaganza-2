<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BALAGANZA – מערכת הזמנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#6B4FBB;--purple-light:#EDE9F7;--purple-dark:#3C2A7A;
  --red:#C0392B;--red-light:#FBEAEA;
  --black:#1A1A2E;--gray:#F4F4F8;--gray2:#E8E8F0;--gray3:#9090A0;
  --white:#FFFFFF;--border:#E0DFF0;--sidebar:230px;
  --green:#1E7E44;--green-light:#E8F8EE;
}
body{font-family:'Heebo',sans-serif;background:#F0EFF8;color:var(--black);min-height:100vh;direction:rtl;font-size:14px}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--purple-dark);color:white;display:flex;flex-direction:column;position:fixed;right:0;top:0;height:100vh;z-index:100;overflow-y:auto}
.logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo-title{font-size:19px;font-weight:700;letter-spacing:0.5px}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:3px}
.user-role{padding:10px 18px;border-bottom:1px solid rgba(255,255,255,0.1)}
.role-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);border-radius:20px;padding:4px 11px;font-size:12px}
.role-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0}
.nav{flex:1;padding:8px 0}
.nav-section{padding:10px 18px 4px;font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;font-size:13.5px;color:rgba(255,255,255,0.72);border-right:3px solid transparent;transition:all 0.12s}
.nav-item:hover{background:rgba(255,255,255,0.07);color:white}
.nav-item.active{background:rgba(255,255,255,0.14);color:white;border-right-color:#C0392B}
.nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.nav-badge{margin-right:auto;background:#C0392B;color:white;font-size:10px;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.sidebar-bottom{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.1)}
.role-switcher label{display:block;font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.role-switcher select{width:100%;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:7px 10px;font-size:13px;font-family:'Heebo',sans-serif;cursor:pointer;appearance:none}
.role-switcher select option{background:#3C2A7A}

/* MAIN */
.main{margin-right:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:white;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.page-title{font-size:16px;font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:10px}
.content{flex:1;padding:22px 24px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Heebo',sans-serif;border:none;transition:opacity 0.15s,transform 0.1s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--purple);color:white}
.btn-primary:hover{opacity:0.88}
.btn-secondary{background:white;color:var(--purple);border:1.5px solid var(--purple)}
.btn-danger{background:var(--red);color:white}
.btn-ghost{background:white;color:var(--gray3);border:1px solid var(--border)}
.btn-success{background:#27AE60;color:white}
.btn-sm{padding:5px 12px;font-size:12px}

/* CARDS */
.card{background:white;border-radius:14px;border:1px solid var(--border);padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:15px;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:white;border-radius:12px;padding:16px 18px;border:1px solid var(--border)}
.stat-val{font-size:26px;font-weight:700;color:var(--purple)}
.stat-label{font-size:12px;color:var(--gray3);margin-top:3px}
.stat-red .stat-val{color:var(--red)}
.stat-green .stat-val{color:#27AE60}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:right;padding:10px 14px;background:#F8F7FC;color:var(--gray3);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px}
td{padding:11px 14px;border-bottom:1px solid var(--gray2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFD}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bg-green{background:var(--green-light);color:var(--green)}
.bg-yellow{background:#FFF7E0;color:#9A6800}
.bg-red{background:var(--red-light);color:var(--red)}
.bg-purple{background:var(--purple-light);color:var(--purple-dark)}
.bg-gray{background:var(--gray2);color:var(--gray3)}
.bg-blue{background:#E8F0FE;color:#1A56C4}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;color:var(--gray3);font-weight:500}
.form-input{background:var(--gray);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;font-family:'Heebo',sans-serif;color:var(--black);width:100%;transition:border-color 0.15s;direction:rtl}
.form-input:focus{outline:none;border-color:var(--purple);background:white}
textarea.form-input{resize:vertical;min-height:80px}
select.form-input{cursor:pointer}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:white;border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;direction:rtl}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray3);line-height:1;flex-shrink:0}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ALERTS */
.alert{padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.alert-info{background:#E8F0FE;color:#1A56C4;border:1px solid #C5D7FC}
.alert-warn{background:#FFF7E0;color:#9A6800;border:1px solid #FFE99A}
.alert-success{background:var(--green-light);color:var(--green);border:1px solid #A8DFB8}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:white;padding:12px 22px;border-radius:12px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--gray3);flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--gray2);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* APPROVE CARD */
.approve-card{background:white;border-radius:12px;border:1px solid var(--border);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.approve-icon{width:42px;height:42px;border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.approve-info{flex:1}
.approve-title{font-weight:600;font-size:13.5px;margin-bottom:3px}
.approve-sub{font-size:12px;color:var(--gray3)}
.approve-actions{display:flex;gap:8px}

/* DJ GRID */
.dj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dj-card{background:white;border-radius:14px;border:1px solid var(--border);padding:18px;cursor:pointer;transition:border-color 0.15s}
.dj-card:hover{border-color:var(--purple)}
.dj-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#9B59B6);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:700;flex-shrink:0}
.skill-tag{background:var(--purple-light);color:var(--purple-dark);font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500}

/* NOTIF */
.notif{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:white;margin-bottom:8px}
.notif.unread{background:#FDFCFF;border-right:3px solid var(--purple)}
.notif-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.notif-text{font-size:13px;line-height:1.5}
.notif-time{font-size:11px;color:var(--gray3);margin-top:2px}

/* REPORT */
.report-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--gray2)}
.report-row:last-child{border-bottom:none}
.progress-bar{height:5px;background:var(--gray2);border-radius:4px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--purple);border-radius:4px}

/* CAL */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-name{text-align:center;font-size:11px;color:var(--gray3);padding:6px 0;font-weight:500}
.cal-day{min-height:90px;background:var(--gray);border-radius:9px;padding:6px 7px;cursor:pointer}
.cal-day:hover{background:var(--gray2)}
.cal-day.today{background:var(--purple-light);border:1.5px solid var(--purple)}
.day-num{font-size:12px;font-weight:500;margin-bottom:3px}
.cal-event{font-size:10px;background:var(--purple);color:white;border-radius:4px;padding:2px 5px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-event.no-dj{background:var(--red)}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;align-items:center;background:white;border-radius:12px;border:1px solid var(--border);padding:12px 16px;margin-bottom:14px}
.search-bar input{flex:1;border:none;background:none;font-size:14px;font-family:'Heebo',sans-serif;outline:none;direction:rtl;color:var(--black)}
.search-bar select{border:1px solid var(--border);background:var(--gray);border-radius:8px;padding:6px 10px;font-size:13px;font-family:'Heebo',sans-serif;color:var(--black)}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--gray3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px;margin-bottom:16px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>

<div class="app">
<div class="sidebar">
  <div class="logo">
    <div class="logo-title">⬡ BALAGANZA</div>
    <div class="logo-sub">מערכת ניהול אירועים</div>
  </div>
  <div class="user-role">
    <div class="role-badge"><div class="role-dot"></div><span id="role-label">מנהל בכיר</span></div>
  </div>
  <nav class="nav" id="main-nav"></nav>
  <div class="sidebar-bottom">
    <div class="role-switcher">
      <label>הצג ממשק עבור:</label>
      <select id="role-select">
        <option value="admin">מנהל בכיר</option>
        <option value="office">עובד משרד</option>
        <option value="dj">דיג׳יי</option>
        <option value="client">לקוח</option>
      </select>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title" id="topbar-title">לוח בקרה</div>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><div>מתחבר ל־Firebase...</div></div>
  </div>
</div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs, onSnapshot, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── FIREBASE CONFIG ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDhLqoZifXBwt33B4K1-IByyFqlPfS0Md8",
  authDomain: "orders-app-balaganza.firebaseapp.com",
  projectId: "orders-app-balaganza",
  storageBucket: "orders-app-balaganza.firebasestorage.app",
  messagingSenderId: "482437758956",
  appId: "1:482437758956:web:7f9f19f51bec3bb13e4ac9",
  measurementId: "G-03HZ6P9W7T"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
let currentUser = null;
let currentUserRole = null; // 'admin' | 'office' | 'dj' | 'client'
let currentUserData = null;

// ── COLLECTIONS ─────────────────────────────────────────
const CLIENTS = 'clients';
const DJS = 'djs';
const BOOKINGS = 'bookings';
const SERVICES = 'services';
const EQUIPMENT = 'equipment';
const LEADS = 'leads';

// ── LOCAL CACHE ──────────────────────────────────────────
window.cache = { clients: [], djs: [], bookings: [], services: [], equipment: [], leads: [] };

// ── UTILS ────────────────────────────────────────────────
window.toast = function(msg, dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

window.openModal = html => document.getElementById('modal-root').innerHTML=html;
window.closeModal = () => document.getElementById('modal-root').innerHTML='';

function djById(id){ return cache.djs.find(d=>d.id===id); }
function clientById(id){ return cache.clients.find(c=>c.id===id); }
window.djName = id=>{ const d=djById(id); return d?d.name:'—'; }
window.clientName = id=>{ const c=clientById(id); return c?c.name:'—'; }

window.statusBadge = s=>{
  const m={
    approved:{l:'מאושר ✓',c:'bg-green'},
    awaiting_dj:{l:'ממתין אישור דיג׳יי',c:'bg-yellow'},
    pending:{l:'ממתין שיבוץ',c:'bg-red'},
    cancelled:{l:'בוטל',c:'bg-gray'},
    waiting:{l:'ממתין שיבוץ',c:'bg-red'},
    reserved:{l:'🔒 שריין',c:'bg-blue'},
  };
  const x=m[s]||{l:s,c:'bg-gray'};
  return `<span class="badge ${x.c}">${x.l}</span>`;
}

window.clientStatusBadge = s=>{
  if(s==='approved') return `<span class="badge bg-green">שיבוץ מאושר ✓</span>`;
  if(s==='cancelled') return `<span class="badge bg-gray">בוטל</span>`;
  return `<span class="badge bg-red">ממתין לשיבוץ</span>`;
}

window.djStatusBadge = s=>{
  const m={free:'bg-green',busy:'bg-yellow',leave:'bg-gray'};
  const l={free:'פנוי',busy:'תפוס',leave:'חל"ת'};
  return `<span class="badge ${m[s]||'bg-gray'}">${l[s]||s}</span>`;
}

const EVENT_TYPES=['בר מצווה','בת מצווה','חתונה','יום הולדת','אירוע חברה','מסיבת מבוגרים','אחר'];

// ── FIRESTORE HELPERS ────────────────────────────────────
async function addItem(col, data){
  const ref = await addDoc(collection(db, col), {...data, createdAt: serverTimestamp()});
  return ref.id;
}

async function updateItem(col, id, data){
  await updateDoc(doc(db, col, id), {...data, updatedAt: serverTimestamp()});
}

async function deleteItem(col, id){
  await deleteDoc(doc(db, col, id));
}

// ── REAL-TIME LISTENERS ───────────────────────────────────
function startListeners(){
  onSnapshot(collection(db, CLIENTS), snap=>{
    cache.clients = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(['clients','dashboard','calendar','reports'].includes(currentPage)) renderPage(currentPage);
    buildNav();
  });
  onSnapshot(collection(db, DJS), snap=>{
    cache.djs = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage==='djs'||currentPage==='dashboard') renderPage(currentPage);
    buildNav();
  });
  onSnapshot(collection(db, BOOKINGS), snap=>{
    cache.bookings = snap.docs.map(d=>({id:d.id,...d.data()}));
    cache.bookings.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    buildNav();
    renderPage(currentPage);
  });
  onSnapshot(collection(db, SERVICES), snap=>{
    cache.services = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage==='service_types') renderPage(currentPage);
  });
  onSnapshot(collection(db, EQUIPMENT), snap=>{
    cache.equipment = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage==='service_types') renderPage(currentPage);
  });
  onSnapshot(collection(db, LEADS), snap=>{
    cache.leads = snap.docs.map(d=>({id:d.id,...d.data()}));
    cache.leads.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    if(currentPage==='crm') renderPage(currentPage);
  });
}

// ── SEED DATA (runs once if empty) ───────────────────────
async function seedIfEmpty(){
  const snap = await getDocs(collection(db, DJS));
  if(!snap.empty) return;
  const djs=[
    {init:'NV',name:'DJ Niv',email:'niv@dj.co.il',phone:'050-9191',price:1200,pricePremium:1500,skills:['בר/בת מצווה','הנחיה לילדים','שנות ה-80'],status:'free',eventsThisMonth:0},
    {init:'LR',name:'DJ Liron',email:'liron@dj.co.il',phone:'052-8282',price:1800,pricePremium:2200,skills:['חתונות','EDM'],status:'free',eventsThisMonth:0},
    {init:'TL',name:'DJ Tal',email:'tal@dj.co.il',phone:'054-7373',price:1500,pricePremium:1900,skills:['מסיבות חברה','פופ'],status:'free',eventsThisMonth:0},
  ];
  const clients=[
    {name:'אולם רמת גן',contact:'מוטי לוי',email:'moty@rg.co.il',phone:'050-1111111',eventTypes:'בר/בת מצווה',perms:'book_cancel',djIds:[]},
    {name:'גן האירועים',contact:'רחל כהן',email:'rachel@garden.co.il',phone:'052-2222222',eventTypes:'חתונות',perms:'book',djIds:[]},
  ];
  const services=[
    {name:'הנחיה לילדים',description:'הנחיה ומשחקים לילדים'},
    {name:'מסיבת מבוגרים',description:'מוזיקה ואווירה למבוגרים'},
    {name:'שנות ה-80',description:'מוזיקה ממיטב שנות ה-80'},
    {name:'EDM / קלאב',description:'מוזיקה אלקטרונית'},
  ];
  const equipment=[
    {name:'מערכת תאורה',description:'תאורה מקצועית לאירועים'},
    {name:'מסך LED',description:'מסך LED גדול'},
    {name:'מיקרופון אלחוטי',description:'מיקרופון למגיש/ת'},
    {name:'תא צילום',description:'Photo Booth לאורחים'},
  ];
  for(const d of djs) await addDoc(collection(db,DJS),{...d,createdAt:serverTimestamp()});
  for(const c of clients) await addDoc(collection(db,CLIENTS),{...c,createdAt:serverTimestamp()});
  for(const s of services) await addDoc(collection(db,SERVICES),{...s,createdAt:serverTimestamp()});
  for(const e of equipment) await addDoc(collection(db,EQUIPMENT),{...e,createdAt:serverTimestamp()});
  toast('✓ נתוני התחלה נטענו');
}

// ── NAV ──────────────────────────────────────────────────
let currentRole='admin', currentPage='dashboard';

const roleNavs={
  admin:[
    {s:'ניהול'},{id:'dashboard',icon:'📊',label:'לוח בקרה'},
    {id:'approvals',icon:'✅',label:'אישורים',badgeKey:'pending'},
    {id:'bookings',icon:'📅',label:'הזמנות'},
    {id:'calendar',icon:'🗓',label:'יומן'},
    {s:'אנשים'},{id:'djs',icon:'🎧',label:'דיג׳יים'},
    {id:'clients',icon:'🏛',label:'לקוחות'},
    {s:'קטלוג'},{id:'service_types',icon:'🗂',label:'שירותים וציוד'},
    {s:'כספים'},{id:'reports',icon:'💰',label:'סיכום חודשי'},
    {s:'CRM'},{id:'crm',icon:'🎯',label:'ניהול לידים'},

window.buildNav = function(){
  const pendingCount=cache.bookings.filter(b=>['pending','waiting','awaiting_dj'].includes(b.status)).length;
  const nav=document.getElementById('main-nav');
  nav.innerHTML='';
  roleNavs[currentRole].forEach(item=>{
    if(item.s){nav.innerHTML+=`<div class="nav-section">${item.s}</div>`;return;}
    const badge=item.badgeKey==='pending'?pendingCount:0;
    nav.innerHTML+=`<div class="nav-item${item.id===currentPage?' active':''}" onclick="navigate('${item.id}')">
      <span class="nav-icon">${item.icon}</span><span>${item.label}</span>
      ${badge?`<span class="nav-badge">${badge}</span>`:''}
    </div>`;
  });
}

window.navigate = function(page){
  currentPage=page; buildNav(); renderPage(page);
}

window.switchRole = function(role){
  currentRole=role;
  const labels={admin:'מנהל בכיר',office:'עובד משרד',dj:'דיג׳יי',client:'לקוח'};
  document.getElementById('role-label').textContent=labels[role];
  const first=roleNavs[role].find(i=>i.id);
  currentPage=first?first.id:'dashboard';
  buildNav(); renderPage(currentPage);
}

window.renderPage = function(page){
  const content=document.getElementById('content');
  const topbarTitle=document.getElementById('topbar-title');
  const topbarActions=document.getElementById('topbar-actions');
  topbarActions.innerHTML='';
  topbarTitle.textContent=pageTitles[page]||page;
  const pages={dashboard,approvals,bookings,calendar,djs,clients,reports,settings,service_types,new_booking,my_bookings,client_profile,client_calendar,dj_calendar,dj_pending,dj_swap,dj_profile,users,crm};
  if(!pages[page]){
    content.innerHTML=`<div class="card"><div class="empty"><div class="empty-icon">🔧</div><div class="empty-text">בקרוב</div></div></div>`;
    return;
  }
  try{
    const result = pages[page]();
    if(result && typeof result.then === 'function'){
      content.innerHTML='<div class="loading"><div class="spinner"></div></div>';
      result.then(html=>{ if(html) content.innerHTML=html; }).catch(e=>{ content.innerHTML=`<div class="card"><div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div></div>`; });
    } else if(result){
      content.innerHTML=result;
    } else {
      content.innerHTML=`<div class="card"><div class="empty"><div class="empty-icon">🔧</div><div class="empty-text">בקרוב</div></div></div>`;
    }
  }catch(e){
    content.innerHTML=`<div class="card"><div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div></div>`;
  }
}

function approvals(){
  const pending=cache.bookings.filter(b=>b.status==='pending'||b.status==='waiting');
  const awaitingDJ=cache.bookings.filter(b=>b.status==='awaiting_dj');
  const swapReqs=cache.bookings.filter(b=>b.swapRequested===true&&b.status==='approved');
  const total=pending.length+awaitingDJ.length+swapReqs.length;
  if(!total) return `<div class="card"><div class="empty"><div class="empty-icon">✅</div><div class="empty-text">אין אישורים ממתינים</div></div></div>`;
  let html=`<div class="alert alert-warn">⚠ ${pending.length} ממתינות לשיבוץ · ${awaitingDJ.length} ממתינות אישור דיג׳יי · ${swapReqs.length} בקשות החלפה</div>`;

  if(swapReqs.length){
    html+=`<div style="font-size:13px;font-weight:600;color:var(--black);margin-bottom:10px">🔄 בקשות החלפת שיבוץ</div>`;
    swapReqs.forEach(b=>{
      const dj=b.djId?djById(b.djId):null;
      html+=`<div class="approve-card" style="border-right:4px solid #E6AC00">
        <div class="approve-icon" style="background:#FFF7E0">🔄</div>
        <div class="approve-info">
          <div class="approve-title">${b.type||''} – ${clientName(b.clientId)} | ${b.date||''} | ${b.timeStart||''}–${b.timeEnd||''}</div>
          <div class="approve-sub">דיג׳יי נוכחי: <strong>${dj?dj.name:'—'}</strong> · סיבה: ${b.swapReason||'—'}</div>
          ${b.swapNotes?`<div class="approve-sub">${b.swapNotes}</div>`:''}
        </div>
        <div class="approve-actions">
          <button class="btn btn-primary btn-sm" onclick="openSwapAssignModal('${b.id}')">שבץ חלופי</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelSwapRequest('${b.id}')">בטל בקשה</button>
        </div>
      </div>`;
    });
  }

  if(awaitingDJ.length){
    html+=`<div style="font-size:13px;font-weight:600;color:var(--black);margin-bottom:10px;margin-top:${swapReqs.length?'18px':0}">⏳ ממתינות לאישור דיג׳יי</div>`;
    awaitingDJ.forEach(b=>{
      const assigned=b.assignedAt?new Date(b.assignedAt).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
      html+=`<div class="approve-card" style="border-right:4px solid #E6AC00">
        <div class="approve-icon" style="background:#FFF7E0">⏳</div>
        <div class="approve-info">
          <div class="approve-title">${b.type||''} – ${clientName(b.clientId)} | ${b.date||''} | ${b.timeStart||''}–${b.timeEnd||''}</div>
          <div class="approve-sub">דיג׳יי: <strong>${djName(b.djId)}</strong> · שובץ: ${assigned}</div>
        </div>
        <div class="approve-actions">
          <button class="btn btn-ghost btn-sm" onclick="openAssignModal('${b.id}')">שבץ אחר</button>
          <button class="btn btn-danger btn-sm" onclick="doCancelBooking('${b.id}')">בטל</button>
        </div>
      </div>`;
    });
  }
  if(pending.length){
    html+=`<div style="font-size:13px;font-weight:600;color:var(--black);margin:${(awaitingDJ.length||swapReqs.length)?'18px':0} 0 10px">🎧 ממתינות לשיבוץ דיג׳יי</div>`;
    pending.forEach(b=>{
      html+=`<div class="approve-card">
        <div class="approve-icon">🎧</div>
        <div class="approve-info">
          <div class="approve-title">${b.type||''} – ${clientName(b.clientId)} | ${b.date||''} | ${b.timeStart||''}–${b.timeEnd||''}</div>
          <div class="approve-sub">${b.celebrant?'חוגג/ת: '+b.celebrant+' · ':''} ${b.notes||''}</div>
        </div>
        <div class="approve-actions">
          <button class="btn btn-primary btn-sm" onclick="openAssignModal('${b.id}')">שבץ דיג׳יי</button>
          <button class="btn btn-ghost btn-sm" onclick="doCancelBooking('${b.id}')">דחה</button>
        </div>
      </div>`;
    });
  }
  return html;
}

function calendar(filterDjId, isClientView){
  if(window._calYear===undefined){
    const now=new Date();
    window._calYear=now.getFullYear();
    window._calMonth=now.getMonth();
  }
  const year=window._calYear, month=window._calMonth;
  const heMonths=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const startOffset=firstDay;

  // For client view — filter by their clientId
  const myClientId = isClientView ? (cache.clients.find(c=>c.email===currentUserData?.email)?.id || cache.clients[0]?.id) : null;

  const evMap={};
  cache.bookings
    .filter(b=>b.status!=='cancelled')
    .filter(b=>!filterDjId || b.djId===filterDjId)
    .filter(b=>!myClientId || b.clientId===myClientId)
    .forEach(b=>{
      if(!b.date) return;
      const p=b.date.split('.');
      if(p.length<3) return;
      const bm=parseInt(p[1])-1, by=parseInt('20'+p[2]), bd=parseInt(p[0]);
      if(bm===month&&by===year){
        if(!evMap[bd]) evMap[bd]=[];
        evMap[bd].push(b);
      }
    });

  const today=new Date();
  const todayDay=(today.getFullYear()===year&&today.getMonth()===month)?today.getDate():-1;
  const dayNames=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const evColor={approved:'background:#1E7E44',awaiting_dj:'background:#E6AC00',pending:'background:#C0392B',waiting:'background:#C0392B'};
  const canAdd = !filterDjId; // admin/office/client can add, dj view cannot

  let cells='';
  for(let i=0;i<startOffset;i++) cells+=`<div style="min-height:90px"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ev=evMap[d]||[];
    const isToday=d===todayDay;
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const calPage=isClientView?'client_calendar':'calendar';
    cells+=`<div class="cal-day${isToday?' today':''}" onclick="${canAdd?`openCalBookingModal('${dateStr}','${isClientView?'client':'admin'}',event)`:''}" style="cursor:${canAdd?'pointer':'default'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <div class="day-num">${d}</div>
        ${canAdd?`<div style="font-size:15px;color:var(--purple);opacity:0.45;line-height:1;padding-left:2px">+</div>`:''}
      </div>
      ${ev.slice(0,3).map(b=>{
        const cl=clientName(b.clientId);
        const dj=b.djId?djName(b.djId):null;
        const s=b.status==='cancelled'?'cancelled':(b.djId&&b.status==='awaiting_dj')?'awaiting_dj':(b.status==='approved'?'approved':'pending');
        const col=evColor[s]||evColor.pending;
        const label=isClientView
          ?(b.status==='approved'&&b.djId
            ?`${b.type||'אירוע'} · ${b.celebrant||''} · ${djName(b.djId)}`
            :`${b.type||'אירוע'} · ${b.celebrant||''} · ממתין שיבוץ`)
          :(dj?`${cl} · ${dj}`:(cl+' – ממתין'));
        return `<div onclick="event.stopPropagation();openBookingDetail('${b.id}')" style="${col};color:white;font-size:10px;border-radius:4px;padding:3px 6px;margin-bottom:3px;overflow:hidden;white-space:normal;word-break:break-word;line-height:1.3;cursor:pointer">${label}</div>`;
      }).join('')}
      ${ev.length>3?`<div style="font-size:9px;color:var(--gray3)">+${ev.length-3} עוד</div>`:''}
    </div>`;
  }

  const navPage=isClientView?'client_calendar':(filterDjId?'dj_calendar':'calendar');
  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button class="btn btn-ghost btn-sm" onclick="window._calMonth--;if(window._calMonth<0){window._calMonth=11;window._calYear--;}renderPage('${navPage}')">→ קודם</button>
      <div style="font-size:15px;font-weight:600">${heMonths[month]} ${year}</div>
      <button class="btn btn-ghost btn-sm" onclick="window._calMonth++;if(window._calMonth>11){window._calMonth=0;window._calYear++;}renderPage('${navPage}')">הבא ←</button>
    </div>
    <div class="cal-grid">
      ${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
      ${cells}
    </div>
    <div style="margin-top:14px;display:flex;gap:16px;font-size:12px;flex-wrap:wrap">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#1E7E44;margin-left:4px"></span>מאושר</span>
      ${!isClientView?`<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#C0392B;margin-left:4px"></span>ממתין שיבוץ</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#E6AC00;margin-left:4px"></span>ממתין אישור דיג׳יי</span>`:''}
      ${canAdd?`<span style="color:var(--gray3);font-size:11px">לחץ על תאריך להוספת הזמנה</span>`:''}
    </div>
  </div>`;
}

window.doSubmitCalBooking = async function(dateStr, isClientStr){
  const isClient=(isClientStr==='true');
  const celebrant=document.getElementById('cb-celebrant').value.trim();
  if(!celebrant){toast('נא למלא שם חוגג/ת');return;}
  const [y,m,d]=dateStr.split('-');
  const start=document.getElementById('cb-start').value;
  const dur=document.getElementById('cb-dur').value;
  const clientSel=document.getElementById('cb-client');
  const myClientId=isClient?(cache.clients.find(c=>c.email===currentUserData?.email)?.id||cache.clients[0]?.id):null;
  const services=[...document.querySelectorAll('.cb-service:checked')].map(cb=>cb.value);
  const equipment=[...document.querySelectorAll('.cb-equip:checked')].map(cb=>cb.value);
  const data={
    clientId:myClientId||(clientSel?clientSel.value:(cache.clients[0]?.id||'')),
    djId:null,
    type:document.getElementById('cb-type').value,
    date:`${d}.${m}.${y.slice(2)}`,

    duration:dur,
    timeEnd:calcEndTime(start,dur),
    celebrant,
    notes:document.getElementById('cb-notes').value,

  try{

    closeModal();
    toast('✓ ההזמנה נשלחה!');
  }catch(e){ toast('שגיאה: '+e.message); }
}

function reports(){
  // Month/year picker state
  const now = new Date();
  const selMonth = window._reportMonth !== undefined ? window._reportMonth : now.getMonth();
  const selYear  = window._reportYear  !== undefined ? window._reportYear  : now.getFullYear();
  window._reportMonth = selMonth;
  window._reportYear  = selYear;

  const heMonths=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

  // Filter approved bookings for selected month
  function inMonth(b){
    if(!b.date) return false;
    const parts=b.date.split('.');
    if(parts.length<3) return false;
    const bMonth=parseInt(parts[1])-1;
    const bYear=parseInt('20'+parts[2]);
    return bMonth===selMonth && bYear===selYear;
  }

  const monthBookings=cache.bookings.filter(b=>b.status==='approved'&&inMonth(b));
  const maxEv=Math.max(1,...cache.djs.map(d=>monthBookings.filter(b=>b.djId===d.id).length));
  const total=cache.djs.reduce((s,d)=>{
    const ev=monthBookings.filter(b=>b.djId===d.id).length;
    return s+ev*(d.price||0);
  },0);
  const totalClientRev=currentRole==='admin'?monthBookings.reduce((s,b)=>s+(b.clientPrice||0),0):0;
  const totalMargin=currentRole==='admin'?totalClientRev-total:0;

  const monthOptions=heMonths.map((m,i)=>`<option value="${i}"${i===selMonth?' selected':''}>${m}</option>`).join('');
  const yearOptions=[2025,2026,2027].map(y=>`<option${y===selYear?' selected':''}>${y}</option>`).join('');

  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-secondary btn-sm" onclick="openExportRangeModal()">📤 ייצא CSV לפי טווח</button>`;

  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
    <select class="form-input" style="width:130px" id="rep-month" onchange="window._reportMonth=parseInt(this.value);renderPage('reports')">${monthOptions}</select>
    <select class="form-input" style="width:90px" id="rep-year" onchange="window._reportYear=parseInt(this.value);renderPage('reports')">${yearOptions}</select>
    <span style="font-size:13px;color:var(--gray3)">סיכום חודשי</span>
  </div>
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-val">${monthBookings.length}</div><div class="stat-label">אירועים מאושרים</div></div>
    <div class="stat-card stat-red"><div class="stat-val">${cache.bookings.filter(b=>b.status==='cancelled'&&inMonth(b)).length}</div><div class="stat-label">בוטלו</div></div>
    <div class="stat-card"><div class="stat-val">₪${total.toLocaleString()}</div><div class="stat-label">תשלום לדיג׳יים</div></div>
    <div class="stat-card stat-green"><div class="stat-val">${cache.djs.filter(d=>monthBookings.some(b=>b.djId===d.id)).length}</div><div class="stat-label">דיג׳יים פעילים</div></div>
  </div>
  ${currentRole==='admin'?`<div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-val" style="color:var(--purple)">₪${totalClientRev.toLocaleString()}</div><div class="stat-label">הכנסות מלקוחות</div></div>
    <div class="stat-card stat-green"><div class="stat-val">₪${totalMargin.toLocaleString()}</div><div class="stat-label">מרווח עסקי</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">₪${total.toLocaleString()}</div><div class="stat-label">עלות דיג׳יים</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:20px">${totalClientRev>0?Math.round(totalMargin/totalClientRev*100)+'%':'—'}</div><div class="stat-label">% מרווח</div></div>
  </div>`:''}
  <div class="card" style="margin-bottom:16px">
    <div class="card-header"><div class="card-title">סיכום לפי דיג׳יי – ${heMonths[selMonth]} ${selYear}</div></div>
    ${cache.djs.map(d=>{
      const evs=monthBookings.filter(b=>b.djId===d.id);
      const amt=evs.length*(d.price||0);
      if(!evs.length) return `<div class="report-row" style="opacity:0.45">
        <div class="dj-avatar" style="width:40px;height:40px;font-size:13px">${d.init||d.name.slice(0,2)}</div>
        <div style="flex:1"><div style="font-weight:600;font-size:14px">${d.name}</div><div style="font-size:12px;color:var(--gray3)">לא שובץ החודש</div></div>
        <div style="font-size:15px;color:var(--gray3)">₪0</div>
      </div>`;
      return `<div class="report-row" onclick="openDJMonthDetail('${d.id}')" style="cursor:pointer">
        <div class="dj-avatar" style="width:40px;height:40px;font-size:13px">${d.init||d.name.slice(0,2)}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">${d.name}</div>
          <div style="font-size:12px;color:var(--gray3)">${evs.length} אירועים · לחץ לפירוט</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(evs.length/maxEv*100)}%"></div></div>
        </div>
        <div style="font-size:17px;font-weight:700;color:var(--purple);min-width:90px;text-align:left">₪${amt.toLocaleString()}</div>
      </div>`;
    }).join('')}
  </div>`;

window.doExportRangeCSV = function(){
  const from = document.getElementById('exp-from').value;
  const to   = document.getElementById('exp-to').value;
  const statusFilter = document.getElementById('exp-status').value;
  if(!from||!to){ toast('נא למלא טווח תאריכים'); return; }
  const fromDate = new Date(from);
  const toDate   = new Date(to); toDate.setHours(23,59,59);

  function bookingDate(b){
    if(!b.date) return null;
    const p = b.date.split('.');
    if(p.length<3) return null;
    return new Date(`20${p[2]}-${p[1]}-${p[0]}`);
  }

  const filtered = cache.bookings.filter(b=>{
    if(statusFilter==='approved' && b.status!=='approved') return false;
    if(statusFilter==='all' && b.status==='cancelled') return false;
    const d = bookingDate(b);
    return d && d>=fromDate && d<=toDate;
  });

  const rows=[['דיג׳יי','תאריך','לקוח','סוג אירוע','שעת התחלה','שעת סיום','תמורת דיג׳יי','תמורת לקוח','סטטוס']];
  filtered.forEach(b=>{
    const dj=b.djId?djById(b.djId):null;
    rows.push([
      dj?dj.name:'—', b.date||'', clientName(b.clientId),
      b.type||'', b.timeStart||'', b.timeEnd||'',
      dj?dj.price:0, b.clientPrice||0, b.status||''
    ]);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`balaganza_${from}_to_${to}.csv`;
  a.click();
  closeModal();
  toast(`✓ יוצאו ${filtered.length} שורות`);
}

window.exportReportCSV = function(){  const selMonth=window._reportMonth!==undefined?window._reportMonth:new Date().getMonth();
  const selYear=window._reportYear!==undefined?window._reportYear:new Date().getFullYear();
  function inMonth(b){
    if(!b.date) return false;
    const p=b.date.split('.');
    return p.length>=3&&parseInt(p[1])-1===selMonth&&parseInt('20'+p[2])===selYear;
  }
  const rows=[['דיג׳יי','תאריך','לקוח','סוג אירוע','שעת התחלה','שעת סיום','תמורה']];
  cache.bookings.filter(b=>b.status==='approved'&&inMonth(b)).forEach(b=>{
    const dj=b.djId?djById(b.djId):null;
    rows.push([dj?dj.name:'—',b.date||'',clientName(b.clientId),b.type||'',b.timeStart||'',b.timeEnd||'',dj?dj.price:0]);
  });
  const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`balaganza_${selMonth+1}_${selYear}.csv`;
  a.click();
  toast('✓ הקובץ הורד');
}

function timeOptions(defaultVal){
  let opts='';
  for(let h=0;h<24;h++){
    for(let m=0;m<60;m+=30){
      const val=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      opts+=`<option value="${val}"${val===defaultVal?' selected':''}>${val}</option>`;
    }
  }
  return opts;
}

function durationOptions(){
  const opts=[
    {v:'1',l:'שעה אחת'},{v:'1.5',l:'שעה וחצי'},{v:'2',l:'שעתיים'},
    {v:'2.5',l:'שעתיים וחצי'},{v:'3',l:'3 שעות'},{v:'3.5',l:'3.5 שעות'},
    {v:'4',l:'4 שעות'},{v:'4.5',l:'4.5 שעות'},{v:'5',l:'5 שעות'},
    {v:'6',l:'6 שעות'},{v:'7',l:'7 שעות'},{v:'8',l:'8 שעות'},
  ];
  return opts.map(o=>`<option value="${o.v}"${o.v==='3'?' selected':''}>${o.l}</option>`).join('');
}

function calcEndTime(start, durHours){
  const [h,m]=start.split(':').map(Number);
  const totalMins = h*60 + m + Math.round(parseFloat(durHours)*60);
  return `${String(Math.floor(totalMins/60)%24).padStart(2,'0')}:${String(totalMins%60).padStart(2,'0')}`;
}

  // Client selector — if forClientId given, only show that client; else show all
  let clientOptions='';

    const relevantClients = forClientId
      ? cache.clients.filter(c=>c.id===forClientId)
      : cache.clients;
    clientOptions = relevantClients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');

  return `<div style="display:flex;flex-direction:column;gap:14px">

window.doSubmitBooking = async function(prefix, afterNav){
  prefix=prefix||'nb';
  const dateVal=document.getElementById(`${prefix}-date`).value;
  const celebrant=document.getElementById(`${prefix}-celebrant`).value.trim();
  if(!dateVal||!celebrant){toast('נא למלא תאריך ושם חוגג/ת');return;}
  const [y,m,d]=dateVal.split('-');
  const start=document.getElementById(`${prefix}-start`).value;
  const dur=document.getElementById(`${prefix}-dur`).value;
  const clientSel=document.getElementById(`${prefix}-client`);
  const services=[...document.querySelectorAll(`.${prefix}-service:checked`)].map(cb=>cb.value);
  const equipment=[...document.querySelectorAll(`.${prefix}-equip:checked`)].map(cb=>cb.value);
  const data={
    clientId:clientSel?clientSel.value:(cache.clients[0]?.id||''),
    djId:null,
    type:document.getElementById(`${prefix}-type`).value,
    date:`${d}.${m}.${y.slice(2)}`,
    timeStart:start,
    duration:dur,
    timeEnd:calcEndTime(start,dur),
    celebrant,
    notes:document.getElementById(`${prefix}-notes`).value,
    services, equipment,
    status:'pending',
  };
  try{
    await addItem(BOOKINGS,data);
    if(afterNav==='close'){ closeModal(); }
    else { navigate(afterNav||'my_bookings'); }
    toast('✓ ההזמנה נשלחה!');
  }catch(e){ toast('שגיאה: '+e.message); }
}

const CRM_STATUSES=['ליצור קשר','הצעת מחיר','לשלוח הסכם','מתלבט','סגור ✓','לא רלוונטי ✕'];
const CRM_SOURCES=['WhatsApp','המלצה','אולם','פרסום','אחר'];
const CRM_STATUS_COLORS={
  'ליצור קשר':'bg-red','הצעת מחיר':'bg-yellow','לשלוח הסכם':'bg-blue',
  'מתלבט':'bg-gray','סגור ✓':'bg-green','לא רלוונטי ✕':'bg-gray'
};

function crm(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="openAddLeadModal()">+ ליד חדש</button>`;

  const filterStatus=window._crmFilter||'';
  const leads=cache.leads.filter(l=>!filterStatus||l.status===filterStatus);

  const statusCounts={};
  CRM_STATUSES.forEach(s=>{ statusCounts[s]=cache.leads.filter(l=>l.status===s).length; });

  const tabsHtml=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
    <div onclick="window._crmFilter='';renderPage('crm')" style="padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;background:${!filterStatus?'var(--purple)':'var(--gray2)'};color:${!filterStatus?'white':'var(--gray3)'}">הכל (${cache.leads.length})</div>
    ${CRM_STATUSES.map(s=>`<div onclick="window._crmFilter='${s}';renderPage('crm')" style="padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;background:${filterStatus===s?'var(--purple)':'var(--gray2)'};color:${filterStatus===s?'white':'var(--gray3)'}">
      ${s} (${statusCounts[s]||0})
    </div>`).join('')}
  </div>`;

  if(!leads.length) return tabsHtml+`<div class="card"><div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">אין לידים${filterStatus?' בסטטוס זה':''}</div><button class="btn btn-primary" onclick="openAddLeadModal()">+ הוסף ליד ראשון</button></div></div>`;

  const rows=leads.map(l=>{
    const sc=CRM_STATUS_COLORS[l.status]||'bg-gray';
    const tasks=(l.tasks||[]);
    const openTasks=tasks.filter(t=>!t.done).length;
    return `<tr onclick="openLeadDetail('${l.id}')" style="cursor:pointer">
      <td><strong>${l.name||'—'}</strong><br><span style="font-size:11px;color:var(--gray3)">${l.phone||''}</span></td>
      <td>${l.eventDate||'—'}</td>
      <td>${l.eventType||'—'}</td>
      <td>${l.venue||'—'}</td>
      <td>₪${(l.proposedPrice||0).toLocaleString()}</td>
      <td><span class="badge bg-blue">${l.source||'—'}</span></td>
      <td><span class="badge ${sc}">${l.status||'—'}</span></td>
      <td>${openTasks?`<span class="badge bg-yellow">📋 ${openTasks} משימות</span>`:'<span style="color:var(--gray3);font-size:12px">—</span>'}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openLeadDetail('${l.id}')">פרטים</button></td>
    </tr>`;
  }).join('');

  return tabsHtml+`<div class="card" style="padding:0"><div class="table-wrap"><table>
    <tr><th>שם ליד</th><th>תאריך אירוע</th><th>סוג</th><th>מקום</th><th>מחיר מוצע</th><th>מקור</th><th>סטטוס</th><th>משימות</th><th></th></tr>
    ${rows}
  </table></div></div>`;
}

  try{ await updateItem(LEADS,id,{tasks}); openLeadDetail(id); }
  catch(e){ toast('שגיאה: '+e.message); }

function dj_calendar(){
  const myDjId=currentUserData?.djId||null;
  if(!myDjId&&currentRole==='dj') return `<div class="card"><div class="empty"><div class="empty-icon">🔗</div><div class="empty-text">חשבון לא מקושר לדיג׳יי. פנה למנהל.</div></div></div>`;
  return calendar(myDjId,false);
}

function client_calendar(){ return calendar(null,true); }

function dj_pending(){
  const myDjId=currentUserData?.djId||null;
  const pending=cache.bookings.filter(b=>b.status==='awaiting_dj'&&(!myDjId||b.djId===myDjId));
  if(!pending.length) return `<div class="card"><div class="empty"><div class="empty-icon">✅</div><div class="empty-text">אין הזמנות ממתינות לאישורך</div></div></div>`;
  let html='';
  pending.forEach(b=>{
    const cl=clientById(b.clientId);
    const assigned=b.assignedAt?new Date(b.assignedAt).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    html+=`<div class="approve-card" style="border-right:4px solid var(--purple)">
      <div class="approve-icon">🎧</div>
      <div class="approve-info">
        <div class="approve-title">${b.type||''} – ${cl?cl.name:'—'}</div>
        <div class="approve-sub">${b.date||''} | ${b.timeStart||''}–${b.timeEnd||''} ${b.celebrant?'| חוגג/ת: '+b.celebrant:''}</div>
        <div class="approve-sub" style="margin-top:2px">שובץ: ${assigned}</div>
      </div>
      <div class="approve-actions">
        <button class="btn btn-success btn-sm" onclick="doDJApprove('${b.id}')">✓ אשר</button>
        <button class="btn btn-danger btn-sm" onclick="doDJReject('${b.id}')">✕ דחה</button>
      </div>
    </div>`;
  });
  return html;
}
window.doDJApprove=async function(id){try{await updateItem(BOOKINGS,id,{status:'approved',approvedAt:new Date().toISOString()});toast('✓ האירוע אושר');}catch(e){toast('שגיאה: '+e.message);}};
window.doDJReject=async function(id){if(!confirm('לדחות הזמנה זו? תחזור לממתין שיבוץ.'))return;try{await updateItem(BOOKINGS,id,{status:'pending',djId:null,assignedAt:null});toast('ההזמנה נדחתה');}catch(e){toast('שגיאה: '+e.message);}};

function dj_swap(){
  const myDjId=currentUserData?.djId||null;
  const myBookings=cache.bookings.filter(b=>b.status==='approved'&&(!myDjId||b.djId===myDjId));
  const swapPending=cache.bookings.filter(b=>b.swapRequested&&(!myDjId||b.djId===myDjId));
  const bookingOptions=myBookings.map(b=>`<option value="${b.id}">${b.date||''} – ${clientName(b.clientId)} – ${b.type||''}</option>`).join('');
  let prevHtml='';
  if(swapPending.length) prevHtml=`<div class="card" style="margin-bottom:14px"><div class="card-title" style="margin-bottom:10px">בקשות קודמות</div>${swapPending.map(b=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray2)"><div><div style="font-size:13px;font-weight:600">${b.date||''} – ${clientName(b.clientId)}</div><div style="font-size:12px;color:var(--gray3)">סיבה: ${b.swapReason||'—'}</div></div><span class="badge bg-yellow">ממתין</span></div>`).join('')}</div>`;
  return `${prevHtml}<div class="card" style="max-width:560px">
    <div class="card-title" style="margin-bottom:14px">בקשת החלפת שיבוץ</div>
    <div class="alert alert-warn">⚠ הבקשה תועבר למנהל.</div>
    ${!bookingOptions?`<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">אין אירועים מאושרים להחלפה</div></div>`:`
    <div class="form-grid" style="margin-top:14px">
      <div class="form-group full"><label class="form-label">האירוע להחלפה</label><select class="form-input" id="swap-booking">${bookingOptions}</select></div>
      <div class="form-group full"><label class="form-label">סיבה</label>
        <select class="form-input" id="swap-reason"><option value="אירוע משפחתי">אירוע משפחתי</option><option value="מחלה">מחלה</option><option value="אחר">אחר</option></select>
      </div>
      <div class="form-group full"><label class="form-label">פרטים נוספים</label><textarea class="form-input" id="swap-notes"></textarea></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:14px">
      <button class="btn btn-primary" onclick="doSubmitSwap()">שלח בקשה →</button>
    </div>`}
  </div>`;
}
window.doSubmitSwap=async function(){const id=document.getElementById('swap-booking').value;const reason=document.getElementById('swap-reason').value;const notes=document.getElementById('swap-notes').value;if(!id){toast('נא לבחור אירוע');return;}try{await updateItem(BOOKINGS,id,{swapRequested:true,swapReason:reason,swapNotes:notes,swapRequestedAt:new Date().toISOString(),swapRequestedBy:currentUserData?.uid||''});toast('✓ הבקשה נשלחה!');renderPage('dj_swap');}catch(e){toast('שגיאה: '+e.message);}};

function dj_profile(){
  const myDjId=currentUserData?.djId||null;
  const dj=myDjId?djById(myDjId):cache.djs.find(d=>d.email===currentUserData?.email);
  if(!dj) return `<div class="card" style="max-width:500px"><div class="card-title" style="margin-bottom:16px">הפרופיל שלי</div><div class="alert alert-info">החשבון לא מקושר לפרופיל דיג׳יי. פנה למנהל.</div></div>`;
  const myBookings=cache.bookings.filter(b=>b.status==='approved'&&b.djId===dj.id);
  const now=new Date();
  const monthBookings=myBookings.filter(b=>{if(!b.date)return false;const p=b.date.split('.');return p.length>=3&&parseInt(p[1])-1===now.getMonth()&&parseInt('20'+p[2])===now.getFullYear();});
  return `<div style="max-width:560px">
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:18px">
        <div class="dj-avatar" style="width:60px;height:60px;font-size:20px">${dj.init||dj.name.slice(0,2)}</div>
        <div><div style="font-size:18px;font-weight:700">${dj.name}</div><div style="font-size:13px;color:var(--gray3);margin-top:4px">${dj.email||''}</div><div style="margin-top:6px">${djStatusBadge(dj.status)}</div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${(dj.skills||[]).map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:var(--purple-light);border-radius:10px;padding:14px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--purple)">${monthBookings.length}</div><div style="font-size:12px;color:var(--gray3)">אירועים החודש</div></div>
        <div style="background:var(--green-light);border-radius:10px;padding:14px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--green)">₪${(monthBookings.length*(dj.price||0)).toLocaleString()}</div><div style="font-size:12px;color:var(--gray3)">תשלום צפוי</div></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-title" style="margin-bottom:12px">סטטוס זמינות</div>
      <select class="form-input" onchange="doUpdateDJStatus(this.value,'${dj.id}')">
        <option value="free"${dj.status==='free'?' selected':''}>פנוי לאירועים</option>
        <option value="busy"${dj.status==='busy'?' selected':''}>תפוס / לא זמין</option>
        <option value="leave"${dj.status==='leave'?' selected':''}>חל"ת</option>
      </select>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-title" style="margin-bottom:10px">📅 חיבור Google Calendar</div>
      <div style="font-size:12px;color:var(--gray3);margin-bottom:10px">הדבק את כתובת ה-iCal של היומן האישי שלך. המנהל יוכל לראות את הזמינות שלך.</div>
      <input class="form-input" id="dj-gcal-url" placeholder="https://calendar.google.com/calendar/ical/..." value="${dj.gcalUrl||''}">
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-secondary btn-sm" onclick="saveDJGcalUrl('${dj.id}')">שמור קישור</button>
        ${dj.gcalUrl?`<a href="${dj.gcalUrl}" target="_blank" class="btn btn-ghost btn-sm">🔗 פתח יומן</a>`:''}
      </div>
      <div style="margin-top:10px;font-size:11px;color:var(--gray3)">
        איך מוצאים את הכתובת? ב-Google Calendar ← הגדרות היומן ← שתף ← כתובת iCal

    </div>
    ${myBookings.length?`<div class="card"><div class="card-title" style="margin-bottom:12px">האירועים שלי</div><div class="table-wrap"><table><tr><th>תאריך</th><th>לקוח</th><th>סוג</th><th>שעות</th><th>תמורה</th></tr>${myBookings.slice(0,8).map(b=>`<tr><td>${b.date||'—'}</td><td>${clientName(b.clientId)}</td><td><span class="badge bg-purple">${b.type||''}</span></td><td>${b.timeStart||''}–${b.timeEnd||''}</td><td style="color:var(--purple);font-weight:600">₪${(dj.price||0).toLocaleString()}</td></tr>`).join('')}</table></div></div>`:''}
  </div>`;
}
window.doUpdateDJStatus=async function(status,djId){try{await updateItem(DJS,djId,{status});toast('✓ הסטטוס עודכן');}catch(e){toast('שגיאה: '+e.message);}};
window.saveDJGcalUrl=async function(djId){const url=document.getElementById('dj-gcal-url').value.trim();try{await updateItem(DJS,djId,{gcalUrl:url});toast('✓ קישור יומן נשמר');renderPage('dj_profile');}catch(e){toast('שגיאה: '+e.message);}};

// ── USER ROLE DETECTION ───────────────────────────────────
async function getUserRole(user){
  // Check users collection for role assignment
  try{
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if(userDoc.exists()){
      return userDoc.data().role || 'client';
    }
  }catch(e){}
  // First user ever = admin
  const usersSnap = await getDocs(collection(db,'users'));
  if(usersSnap.empty){
    await setDoc(doc(db,'users',user.uid),{
      email: user.email,
      name: user.displayName,
      role: 'admin',
      createdAt: serverTimestamp()
    });
    return 'admin';
  }
  // Unknown user — create as pending
  await setDoc(doc(db,'users',user.uid),{
    email: user.email,
    name: user.displayName,
    role: 'pending',
    createdAt: serverTimestamp()
  });
  return 'pending';
}

// ── INIT ─────────────────────────────────────────────────
function init(){
  showLoginScreen();
  onAuthStateChanged(auth, async user => {
    if(!user){
      showLoginScreen();
      return;
    }
    currentUser = user;
    // Determine role
    const role = await getUserRole(user);
    if(role === 'pending'){
      hideLoginScreen();
      document.querySelector('.app').style.display='none';
      let ps=document.getElementById('pending-screen');
      if(!ps){
        ps=document.createElement('div');
        ps.id='pending-screen';
        ps.innerHTML=`<div style="min-height:100vh;background:#F0EFF8;display:flex;align-items:center;justify-content:center;font-family:Heebo,sans-serif;direction:rtl">
          <div style="background:white;border-radius:20px;padding:48px 40px;max-width:420px;width:100%;text-align:center;border:1px solid #E0DFF0">
            <div style="font-size:40px;margin-bottom:16px">⏳</div>
            <div style="font-size:18px;font-weight:700;margin-bottom:10px">ממתין לאישור גישה</div>
            <div style="font-size:14px;color:#9090A0;margin-bottom:24px">החשבון שלך (${user.email}) ממתין לאישור המנהל.</div>
            <button onclick="doSignOut()" style="padding:10px 24px;background:#6B4FBB;color:white;border:none;border-radius:9px;font-size:14px;cursor:pointer;font-family:Heebo,sans-serif">התנתק</button>
          </div>
        </div>`;
        document.body.appendChild(ps);
      }
      ps.style.display='block';
      return;
    }
    currentUserRole = role;
    currentUserData = { uid: user.uid, email: user.email, name: user.displayName, role };
    // If DJ — auto-link to DJ record by email
    if(role==='dj'){
      try{
        const djSnap=await getDocs(collection(db,DJS));
        const matched=djSnap.docs.find(d=>d.data().email===user.email);
        if(matched) currentUserData.djId=matched.id;
      }catch(e){}
    }
    hideLoginScreen();
    const ps=document.getElementById('pending-screen');
    if(ps) ps.style.display='none';
    // Update sidebar with user info
    document.getElementById('role-label').textContent = {admin:'מנהל בכיר',office:'עובד משרד',dj:'דיג׳יי',client:'לקוח'}[role]||role;
    document.getElementById('role-select').value = role;
    // Add logout button to sidebar bottom
    const sb = document.querySelector('.sidebar-bottom');
    if(!document.getElementById('logout-btn')){
      const logoutDiv = document.createElement('div');
      logoutDiv.style.cssText='margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1)';
      logoutDiv.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">${(user.displayName||user.email||'U')[0].toUpperCase()}</div>
        <div style="flex:1;overflow:hidden"><div style="font-size:12px;font-weight:500;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${user.displayName||user.email}</div><div style="font-size:10px;color:rgba(255,255,255,0.45)">${user.email}</div></div>
      </div>
      <button id="logout-btn" onclick="doSignOut()" style="width:100%;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:7px;font-size:12px;cursor:pointer;font-family:Heebo,sans-serif">התנתק</button>`;
      sb.appendChild(logoutDiv);
    }
    try{
      await seedIfEmpty();
      const snap=await getDocs(collection(db,'settings'));
      if(!snap.empty){ window._settings=snap.docs[0].data(); }
    }catch(e){}
    startListeners();
    switchRole(role);
  });
}

// ── ROLE SWITCHER EVENT LISTENER ─────────────────────────
document.getElementById('role-select').addEventListener('change', function(){
  switchRole(this.value);
});

init();
